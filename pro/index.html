<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AutoMax | Concesionaria</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ================= NAVBAR ================= -->
<header class="barra-navegacion">
  
  <!-- Logo del sitio -->
  <div class="logo">
    Auto<span>Max</span>
  </div>

  <!-- Menú principal -->
  <nav class="menu">
    <a href="inicio.html">Inicio</a>
    <a href="#">Nosotros</a>
    <a href="#">Autos</a>
    <a href="#">Sucursales</a>
    <a href="#">Comparar</a>
    <a href="#">Noticias</a>
  </nav>

  <!-- Botón principal -->
  <button class="btn-principal">Comprar auto</button>

</header>


<!-- Portada-->
<section class="portada">

  <!-- Capa oscura para mejorar contraste -->
  <div class="capa-oscura"></div>

  <!-- Imagen principal del auto -->
  <img src="imagenes/auto.png" class="imagen-auto">

  <!-- Texto principal -->
  <div class="texto-portada">
    <span class="etiqueta">Nuevo ingreso 2025</span>

    <h1>
      Encontrá el auto ideal <br>
      para vos
    </h1>

    <p class="descripcion">
      Explorá nuestra variedad de vehículos y descubrí el modelo que mejor se adapta a tu estilo de vida.
    </p>

    <p class="precio">
      Desde <strong>$55.897</strong>
    </p>
  </div>

</section>


<!--Buscador-->
<section class="seccion-buscador">

  <h2>Buscar vehículo</h2>

  <div class="contenedor-buscador">

    <!-- Input de texto -->
    <input type="text" placeholder="Ej: Toyota, Ford, SUV...">

    <!--Filtro por marca-->
    <select>
      <option>Marca</option>
      <option>Toyota</option>
      <option>Ford</option>
      <option>Chevrolet</option>
    </select>

    <!--Filtro por tipo-->
    <select>
      <option>Tipo</option>
      <option>Sedan</option><!--auto clasico-->>
      <option>SUV</option><!--autos de carga-->>
      <option>Pickup</option><!--camionetas con cajas atras-->>
    </select>

    <!-- Ubicación -->
    <select>
      <option>Ubicación</option>
      <option>Buenos Aires</option>
      <option>Córdoba</option>
      <option>Rosario</option>
    </select>

    <!-- Botón buscar -->
    <button class="btn-buscar">Buscar</button>

  </div>

</section>

</body>
</html>
